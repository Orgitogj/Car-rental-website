{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <title>{% block title %}Company Dashboard{% endblock %}</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/Admin.css' %}">


  {% block extra_css %}{% endblock %}
</head>

<body class="bg-light">

<div class="d-flex">

  <!-- SIDEBAR -->
  <aside class="bg-dark text-white p-4" style="width:260px; min-height:100vh;">
    <h4 class="mb-4">{{ request.user.company.name }}</h4>

    <ul class="nav flex-column gap-2">
      <li class="nav-item">
        <a href="{% url 'dashboard_home' %}" class="nav-link text-white">Dashboard</a>
      </li>
      <li class="nav-item">
        <a href="{% url 'my_cars' %}" class="nav-link text-white">My Cars</a>
      </li>
      <li class="nav-item">
        <a href="{% url 'company_bookings' %}" class="nav-link text-white">Bookings</a>
      </li>
      <li class="nav-item">
        <a href="{% url 'company_profile' %}" class="nav-link text-white">Profile</a>
      </li>
      <li class="nav-item mt-4">
        <a href="{% url 'portal_logout' %}" class="nav-link text-white">Logout</a>
      </li>
    </ul>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="flex-grow-1 p-4">
    {% block content %}{% endblock %}
  </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
