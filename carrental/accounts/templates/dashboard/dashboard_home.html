{% extends "dashboard/base_dashboard.html" %}

{% block title %}Dashboard{% endblock %}

{% block content %}
<h2 class="mb-4">Dashboard</h2>

<div class="row g-4">
  <div class="col-md-4">
    <div class="card shadow-sm p-3">
      <h6>Total Cars</h6>
      <h3>{{ cars_count }}</h3>
    </div>
  </div>

  <div class="col-md-4">
    <div class="card shadow-sm p-3">
      <h6>Total Bookings</h6>
      <h3>{{ bookings_count }}</h3>
    </div>
  </div>
</div>
{% endblock %}
